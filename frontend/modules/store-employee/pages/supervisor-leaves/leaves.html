<div class="supervisor-leaves-workspace animate-fade-in">

  <!-- ===== PAGE HEADER ===== -->
  <div class="card glass header-banner-card-new">
    <div class="header-banner-left">
      <div class="header-banner-icon-badge">
        <i data-lucide="clock"></i>
      </div>
      <div class="welcome-details">
        <h2 class="welcome-title-new">Pending Barista Time Off Requests</h2>
        <p class="welcome-subtitle-new">Review and approve or reject pending time off requests</p>
      </div>
    </div>
    
    <div class="header-banner-right">
      <div class="pending-stat-box">
        <div class="pending-stat-icon">
          <i data-lucide="hourglass"></i>
        </div>
        <div class="pending-stat-details">
          <span class="pending-stat-number" id="lbl-pending-count-stat">0</span>
          <span class="pending-stat-label">Pending Requests</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== FILTER TOOLBAR ===== -->
  <div class="toolbar-row">
    <div class="toolbar-left-group">
      <select class="form-select toolbar-select" id="select-status-filter">
        <option value="ALL">All Status</option>
        <option value="PENDING">Pending</option>
        <option value="APPROVED">Approved</option>
        <option value="REJECTED">Rejected</option>
      </select>
      
      <div class="datepicker-badge">
        <i data-lucide="calendar"></i>
        <span id="lbl-date-range-filter">Jul 21, 2026 - Jul 27, 2026</span>
      </div>
    </div>
    
    <div class="toolbar-right-group">
      <select class="form-select toolbar-select" id="select-sort-filter">
        <option value="NEWEST">Sort by: Newest First</option>
        <option value="OLDEST">Sort by: Oldest First</option>
      </select>
      
      <div class="layout-toggle-buttons">
        <button type="button" class="btn-layout-toggle active" id="btn-grid-layout" title="Grid View">
          <i data-lucide="layout-grid"></i>
        </button>
        <button type="button" class="btn-layout-toggle" id="btn-list-layout" title="List View">
          <i data-lucide="list"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== REQUESTS FEED GRID CONTAINER ===== -->
  <div class="requests-grid-container-new" id="requests-grid-container">
    <!-- Dynamic list grid cards -->
  </div>

  <!-- ===== REJECTION MODAL DIALOG OVERLAY ===== -->
  <div id="reject-modal" class="modal-overlay-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="card glass modal-content-panel">
      <h3 class="modal-title">Reject Barista Leave</h3>
      
      <div class="form-group">
        <label for="reject-reason-input" class="form-label">
          Rejection Reason <span class="required-star">*</span> (min 10 chars)
        </label>
        <textarea id="reject-reason-input" class="form-textarea" rows="3" placeholder="State reason for rejection..." required></textarea>
      </div>

      <div class="modal-actions-row">
        <button id="reject-modal-submit" class="btn btn-danger btn-confirm-rejection" type="button">Confirm Rejection</button>
        <button id="reject-modal-close" class="btn btn-secondary btn-cancel-rejection" type="button">Cancel</button>
      </div>
    </div>
  </div>

</div>

<!-- ===== LOADING TEMPLATE ===== -->
<template id="leaves-loading-tpl">
  <div class="loading-state-box">
    <i data-lucide="loader-2" class="spin-icon" aria-hidden="true"></i>
    <span class="loading-text font-bold">Loading time off requests...</span>
  </div>
</template>

<!-- ===== EMPTY LIST TEMPLATE ===== -->
<template id="leaves-empty-list-tpl">
  <div class="card glass empty-list-card">
    <i data-lucide="check-circle" class="empty-icon" aria-hidden="true"></i>
    <span class="empty-title">All Barista Requests Signed Off</span>
    <span class="empty-subtitle">No pending leave applications or cancellation requests to process.</span>
  </div>
</template>

<!-- ===== LEAVE APPLICATION REQUEST CARD TEMPLATE ===== -->
<template id="leave-request-card-tpl">
  <div class="leave-approval-card-new card glass">
    <!-- Header: Avatar, Info, Category Badge -->
    <div class="card-header-row-new">
      <div class="card-header-left-new">
        <div class="avatar-circle-new">
          <span class="avatar-text-new"></span>
        </div>
        <div class="employee-details-new">
          <strong class="employee-email-lbl"></strong>
          <span class="employee-role-lbl">Barista</span>
        </div>
      </div>
      <span class="leave-type-badge-new font-bold"></span>
    </div>

    <!-- Details block (3 columns) -->
    <div class="request-details-grid-new">
      <div class="detail-column-new">
        <div class="detail-label-new">
          <i data-lucide="calendar"></i> DURATION
        </div>
        <div class="detail-value-bold-new duration-days-val"></div>
        <div class="detail-value-sub-new duration-dates-val"></div>
      </div>
      
      <div class="detail-column-new">
        <div class="detail-label-new">
          <i data-lucide="clock"></i> REQUESTED ON
        </div>
        <div class="detail-value-bold-new requested-date-val"></div>
        <div class="detail-value-sub-new requested-time-val"></div>
      </div>
      
      <div class="detail-column-new">
        <div class="detail-label-new">
          <i data-lucide="user"></i> REASON
        </div>
        <div class="detail-value-quote-new reason-text-val"></div>
      </div>
    </div>

    <!-- Comment and Warning section -->
    <div class="medical-cert-warning font-bold" style="display:none;margin-bottom:12px;">
      <i data-lucide="alert-circle" aria-hidden="true"></i> Medical Certificate Required
    </div>

    <div class="comment-input-row-new">
      <input type="text" class="supervisor-comment-input-new form-input" placeholder="Optional approval comment...">
    </div>

    <!-- Actions row -->
    <div class="action-buttons-row-new">
      <button class="btn-approve-new btn-approve-leave" type="button">
        <i data-lucide="check"></i> Approve
      </button>
      <button class="btn-reject-new btn-reject-leave" type="button">
        <i data-lucide="x"></i> Reject
      </button>
    </div>
  </div>
</template>

<!-- ===== CANCELLATION REQUEST CARD TEMPLATE ===== -->
<template id="cancellation-request-card-tpl">
  <div class="leave-approval-card-new card glass cancellation-style">
    <div class="card-header-row-new">
      <div class="card-header-left-new">
        <div class="avatar-circle-new">
          <span class="avatar-text-new"></span>
        </div>
        <div class="employee-details-new">
          <strong class="employee-email-lbl"></strong>
          <span class="employee-role-lbl">Barista</span>
        </div>
      </div>
      <span class="leave-type-badge-new font-bold cancellation">CANCELLATION</span>
    </div>

    <div class="request-details-grid-new">
      <div class="detail-column-new">
        <div class="detail-label-new">
          <i data-lucide="calendar"></i> DURATION
        </div>
        <div class="detail-value-bold-new duration-days-val"></div>
        <div class="detail-value-sub-new duration-dates-val"></div>
      </div>
      
      <div class="detail-column-new">
        <div class="detail-label-new">
          <i data-lucide="clock"></i> REQUESTED ON
        </div>
        <div class="detail-value-bold-new requested-date-val"></div>
        <div class="detail-value-sub-new requested-time-val"></div>
      </div>
      
      <div class="detail-column-new">
        <div class="detail-label-new">
          <i data-lucide="user"></i> REASON
        </div>
        <div class="detail-value-quote-new reason-text-val"></div>
      </div>
    </div>

    <div class="action-buttons-row-new">
      <button class="btn-approve-new btn-approve-cancel" type="button">
        <i data-lucide="check"></i> Approve Cancellation
      </button>
    </div>
  </div>
</template>
