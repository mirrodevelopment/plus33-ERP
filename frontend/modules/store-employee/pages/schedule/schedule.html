<!--
 ******************************************************************************
 * Project           : PLUS33 Coffee ERP
 * Module            : Store Employee — My Barista Roster
 * File              : schedule.html
 * Path              : frontend/modules/store-employee/schedule/schedule.html
 * Purpose           : HTML template for Store Employee Schedule page layout
 * Version           : 2.0.0
 *
 * Related JS        : schedule.js
 * Related CSS       : schedule.css
 *
 * Description
 * ---------------------------------------------------------------------------
 * Structural layout of shift calendar grid calendars, peer request trades form,
 * pending swap tables logs, weekend toggle boxes, and modal panels overlays.
 * No inline styles, no inline javascript event handlers.
 ******************************************************************************
-->

<div class="employee-schedule-workspace animate-fade-in">

  <!-- ===== PAGE HEADER ===== -->
  <div class="card glass header-banner-card">
    <div class="welcome-details">
      <h2 class="welcome-title">My Barista Roster</h2>
      <p class="welcome-subtitle">
        Employee: <span class="highlight-val" id="lbl-employee-name">—</span> &nbsp;·&nbsp; Location: <span class="highlight-val" id="lbl-store-name">Green Park Café</span>
      </p>
    </div>
    
    <div class="header-status-pill" role="status" aria-live="polite">
      <span class="live-dot" aria-hidden="true"></span>
      <span>Schedule Synced</span>
    </div>
  </div>



  <!-- ===== WEEKLY CALENDAR GRID CONTAINER ===== -->
  <div class="card glass calendar-card">
    <div class="calendar-header-split">
      <h3 class="calendar-split-title">Shift Calendar: Current Week</h3>
      <span class="calendar-week-range" id="lbl-week-range">06 July - 12 July 2026</span>
    </div>

    <div class="schedule-grid" id="schedule-cards-grid">
      <!-- Calendar day cards loaded dynamically by JS -->
    </div>
  </div>

  <!-- ===== MAIN GRID SPLIT WORKSPACE ===== -->
  <div class="workspace-grid-layout">
    
    <!-- Left Column: Shift Swap Station -->
    <div class="layout-column-left">
      <div class="card glass swap-card">
        <div class="card-header-split">
          <h3 class="card-split-title">Request Shift Swap</h3>
          <i data-lucide="refresh-cw" class="card-split-icon" aria-hidden="true"></i>
        </div>

        <div class="swap-form-body">
          <div class="form-group">
            <label for="swap-my-shift" class="form-label">Select My Shift <span style="font-size:0.65rem; color:var(--text-muted); font-weight:400;">(next 7 days only)</span></label>
            <select id="swap-my-shift" class="form-select">
              <option value="">-- Choose one of your shifts --</option>
              <!-- Populated dynamically by JS -->
            </select>
          </div>

          <div class="form-group" id="preferred-shift-group" style="display:none;">
            <label for="swap-peer-shift" class="form-label">Preferred Shift Type</label>
            <select id="swap-peer-shift" class="form-select">
              <option value="">-- Choose preferred shift --</option>
              <!-- Populated dynamically based on selected shift -->
            </select>
            <span id="preferred-shift-hint" style="font-size:0.65rem; color:var(--text-muted); display:block; margin-top:4px;"></span>
          </div>

          <div class="form-group" id="preferred-date-group" style="display:none;">
            <label for="swap-preferred-date" class="form-label">
              Preferred Date to Work New Shift
              <span style="font-size:0.65rem; color:var(--text-muted); font-weight:400;">(within next 7 days)</span>
            </label>
            <input type="date" id="swap-preferred-date" class="form-input">
            <span id="preferred-date-hint" style="font-size:0.65rem; color:var(--text-muted); display:block; margin-top:4px;">Select the date you would like to work your new shift.</span>
          </div>

          <button class="btn btn-primary btn-submit-swap" id="btn-submit-swap" type="button">
            Submit Roster Swap Request
          </button>
        </div>

        <!-- Pending and Past Trades Logs -->
        <div class="swap-log-section">
          <h4 class="swap-log-title">Pending &amp; Past Swap Requests</h4>
          <div class="table-scroller">
            <table class="swap-requests-table">
              <thead>
                <tr class="table-header-row">
                  <th scope="col">My Shift Date</th>
                  <th scope="col">Preferred Shift</th>
                  <th scope="col">Preferred Date</th>
                  <th scope="col">Status</th>
                </tr>
              </thead>
              <tbody id="swap-requests-tbody">
                <!-- Loaded dynamically by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>



  </div>

  <!-- ===== SHIFT DETAILS MODAL PANEL OVERLAY ===== -->
  <div id="schedule-modal-overlay" class="modal-overlay-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="card glass modal-content-panel animate-slide-up" id="schedule-modal-content">
      <!-- Modal details injected here by JS -->
    </div>
  </div>

</div>


<!-- ===== EMPTY TRADES ROW TEMPLATE ===== -->
<template id="swap-empty-row-tpl">
  <tr>
    <td colspan="4" class="empty-swaps-cell">No swap requests submitted yet.</td>
  </tr>
</template>


<!-- ===== TRADE REQUEST ITEM ROW TEMPLATE ===== -->
<template id="swap-row-tpl">
  <tr class="swap-row">
    <td class="swap-my-cell font-bold"></td>
    <td class="swap-target-cell"></td>
    <td class="swap-preferred-date-cell"></td>
    <td class="swap-status-cell font-bold"></td>
  </tr>
</template>
