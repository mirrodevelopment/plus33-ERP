<!--
 ******************************************************************************
 * Project           : PLUS33 Coffee ERP
 * Module            : Ultimate Admin — Warehouses Management
 * File              : warehouses.html
 * Path              : frontend/modules/ultimate-admin/warehouses/warehouses.html
 * Purpose           : HTML structure for the Warehouses Management page
 * Version           : 2.0.0
 *
 * Related JS        : warehouses.js
 * Related CSS       : warehouses.css
 * Related APIs      : GET /api/v1/warehouses
 *                     POST /api/v1/warehouses
 *                     DELETE /api/v1/warehouses/:id
 *                     PATCH /api/v1/warehouses/:id/activate
 *                     PATCH /api/v1/warehouses/:id/deactivate
 *                     GET /api/v1/regions
 *
 * Description
 * ---------------------------------------------------------------------------
 * Defines the static HTML structure of the Warehouses Management workspace.
 * JavaScript (warehouses.js) manages fetching, DOM injection, and events.
 * No inline styles. No inline onclick handlers.
 ******************************************************************************
-->

<div class="warehouses-workspace">

  <!-- ===== PAGE HEADER ===== -->
  <div class="page-header warehouses-header">
    <div class="page-header-left">
      <div class="page-eyebrow">
        <i data-lucide="archive" aria-hidden="true"></i>
        <span>Logistics</span>
      </div>
      <h1 class="page-title">Warehouses Management</h1>
      <p class="page-subtitle">Configure distribution hubs, central warehouses, physical topology mappings, and logistics status.</p>
    </div>
    <div class="page-header-right">
      <button id="btn-add-warehouse" class="btn btn-primary" type="button" aria-label="Add new warehouse distribution hub">
        <i data-lucide="plus" aria-hidden="true"></i>
        <span>Add Warehouse</span>
      </button>
    </div>
  </div>

  <!-- ===== KPI SUMMARY ROW ===== -->
  <div class="warehouses-kpi-grid" role="region" aria-label="Warehouses summary metrics">
    <div class="kpi-card kpi-card--gold">
      <span class="kpi-label">Total Warehouses</span>
      <span class="kpi-value" id="kpi-total-warehouses">—</span>
    </div>
    <div class="kpi-card kpi-card--success">
      <span class="kpi-label">Active Logistics Hubs</span>
      <span class="kpi-value" id="kpi-active-warehouses">—</span>
    </div>
    <div class="kpi-card kpi-card--danger">
      <span class="kpi-label">Suspended Hubs</span>
      <span class="kpi-value" id="kpi-inactive-warehouses">—</span>
    </div>
    <div class="kpi-card kpi-card--secondary">
      <span class="kpi-label">Serviced Territories</span>
      <span class="kpi-value" id="kpi-serviced-regions">—</span>
    </div>
  </div>

  <!-- ===== FILTER BAR ===== -->
  <div class="card glass warehouses-filter-bar" role="search" aria-label="Warehouse filters">
    
    <!-- Search Box -->
    <div class="filter-search-wrapper">
      <i data-lucide="search" class="filter-search-icon" aria-hidden="true"></i>
      <input
        id="input-search-warehouses"
        type="search"
        class="filter-search-input"
        placeholder="Search hub name or code..."
        autocomplete="off"
        aria-label="Search warehouses"
      >
    </div>

    <!-- Region Dropdown Filter -->
    <div class="filter-group">
      <label for="select-filter-region" class="filter-label">Filter Territory:</label>
      <select id="select-filter-region" class="filter-select" aria-label="Filter warehouses by territory region">
        <option value="all">All Regions</option>
        <!-- Dynamic options populated by JS -->
      </select>
    </div>

  </div><!-- /warehouses-filter-bar -->

  <!-- ===== WAREHOUSES CARDS GRID ===== -->
  <div id="warehouses-cards-grid" class="warehouses-cards-grid" role="list" aria-label="Distribution hubs list">
    <!-- Warehouse cards populated here by warehouses.js -->
  </div>

</div><!-- /warehouses-workspace -->


<!-- ===== ADD WAREHOUSE MODAL ===== -->
<div
  id="add-warehouse-modal"
  class="modal-overlay"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modal-title-warehouse"
  hidden
>
  <div class="modal-card card glass">

    <div class="modal-header">
      <h3 id="modal-title-warehouse" class="modal-title">Create New Warehouse</h3>
      <button id="btn-close-warehouse-modal" class="btn-icon modal-close-btn" type="button" aria-label="Close dialog">
        <i data-lucide="x" aria-hidden="true"></i>
      </button>
    </div>

    <form id="form-add-warehouse" class="modal-form" novalidate>

      <div class="form-group">
        <label for="wh-modal-name" class="form-label">Warehouse Name</label>
        <input
          id="wh-modal-name"
          type="text"
          class="form-input"
          placeholder="e.g. Marseille Logistics Hub"
          required
          aria-required="true"
        >
      </div>
      
      <div class="form-group">
        <label for="wh-modal-region" class="form-label">Territory Region</label>
        <select id="wh-modal-region" class="form-select" required aria-required="true">
          <option value="" disabled selected>— Select Region —</option>
          <!-- Dynamic options populated by JS -->
        </select>
      </div>

      <div class="form-group">
        <label for="wh-modal-address" class="form-label">Address</label>
        <input
          id="wh-modal-address"
          type="text"
          class="form-input"
          placeholder="e.g. 10 Avenue du Fret, 13000 Marseille"
          required
          aria-required="true"
        >
      </div>

      <div class="form-grid-2col">
        <div class="form-group">
          <label for="wh-modal-phone" class="form-label">Phone Number</label>
          <input
            id="wh-modal-phone"
            type="text"
            class="form-input"
            placeholder="+33-4-000-00"
            required
            aria-required="true"
          >
        </div>
        <div class="form-group">
          <label for="wh-modal-email" class="form-label">Warehouse Email</label>
          <input
            id="wh-modal-email"
            type="email"
            class="form-input"
            placeholder="warehouse@plus33.com"
            required
            aria-required="true"
          >
        </div>
      </div>

      <div class="form-grid-2col">
        <div class="form-group">
          <label for="wh-modal-timezone" class="form-label">Timezone</label>
          <input
            id="wh-modal-timezone"
            type="text"
            class="form-input"
            value="Europe/Paris"
            required
            aria-required="true"
          >
        </div>
        <div class="form-group">
          <label for="wh-modal-date" class="form-label">Opening Date</label>
          <input
            id="wh-modal-date"
            type="date"
            class="form-input"
            required
            aria-required="true"
          >
        </div>
      </div>
      
      <button id="btn-wh-submit" type="submit" class="btn btn-primary btn-modal-submit">
        Register Warehouse
      </button>

    </form>

  </div>
</div><!-- /add-warehouse-modal -->


<!-- ===== WAREHOUSE CARD TEMPLATE ===== -->
<template id="warehouse-card-tpl">
  <div class="card glass warehouses-card animate-slide-up" role="listitem">
    
    <!-- Action buttons container -->
    <div class="warehouse-actions-wrapper">
      <button
        class="btn-toggle-wh-state"
        type="button"
        title="Toggle warehouse operational state"
      >
        <i data-lucide="toggle-left" aria-hidden="true"></i>
      </button>
      <button
        class="btn-delete-wh"
        type="button"
        title="Delete Warehouse location"
      >
        <i data-lucide="trash-2" aria-hidden="true"></i>
      </button>
    </div>

    <!-- Top Identity Details -->
    <div class="warehouse-card-header">
      <div class="warehouse-code"></div>
      <h3 class="warehouse-name" title=""></h3>
      <div class="warehouse-region-badge">
        <i data-lucide="map-pin" aria-hidden="true"></i>
        <span class="region-code"></span>
      </div>
    </div>

    <!-- Contact Info Block -->
    <div class="warehouse-contact-info">
      <div class="contact-row">
        <i data-lucide="navigation" aria-hidden="true"></i>
        <span class="contact-address" title=""></span>
      </div>
      <div class="contact-row">
        <i data-lucide="phone" aria-hidden="true"></i>
        <span class="contact-phone"></span>
      </div>
      <div class="contact-row">
        <i data-lucide="mail" aria-hidden="true"></i>
        <span class="contact-email" title=""></span>
      </div>
    </div>

    <!-- Footer Meta Row -->
    <div class="warehouse-card-footer">
      <div class="warehouse-status-badge"></div>
      <div class="warehouse-opening-date"></div>
    </div>

  </div>
</template><!-- /warehouse-card-tpl -->


<!-- ===== EMPTY STATE TEMPLATE ===== -->
<template id="warehouses-empty-tpl">
  <div class="card glass warehouses-empty col-span-3" role="status" aria-live="polite">
    <i data-lucide="info" aria-hidden="true"></i>
    <p>No matching logistics locations found.</p>
  </div>
</template>
